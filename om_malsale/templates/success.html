<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>Order Confirmed | Om Masale</title>
<style>
/* ===== RESET & GLOBAL ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --success-gradient: linear-gradient(135deg, #10b981, #059669);
  --glass-bg: rgba(255, 255, 255, 0.9);
  --glass-border: rgba(255, 255, 255, 0.25);
  --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  --shadow-xl: 0 35px 60px -12px rgba(0, 0, 0, 0.3);
}
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #f0f9ff 100%);
  color: #166534;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  overflow: hidden;
  position: relative;
}

/* Floating particles background */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    radial-gradient(2px 2px at 20px 30px, #22c55e, transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(34,197,94,0.8), transparent),
    radial-gradient(1px 1px at 90px 40px, #22c55e, transparent),
    radial-gradient(1px 1px at 130px 80px, rgba(34,197,94,0.6), transparent);
  background-repeat: repeat;
  background-size: 200px 100px;
  animation: float 20s ease-in-out infinite;
  opacity: 0.3;
}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(180deg); }
}

/* ===== SUCCESS CONTAINER ===== */
.success-container {
  background: var(--glass-bg);
  backdrop-filter: blur(30px);
  border-radius: 40px;
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--glass-border);
  padding: 4rem 3rem;
  text-align: center;
  max-width: 500px;
  width: 100%;
  position: relative;
  animation: celebrate 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
  transform: scale(0.7);
}
@keyframes celebrate {
  to {
    transform: scale(1) rotateX(0deg);
    opacity: 1;
  }
}

/* ===== SUCCESS CHECKMARK ===== */
.checkmark {
  width: 120px;
  height: 120px;
  margin: 0 auto 2rem;
  background: conic-gradient(from 0deg, #10b981, #34d399, #10b981, #059669);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 0 40px rgba(16, 185, 129, 0.6);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); }
  50% { box-shadow: 0 0 60px rgba(16, 185, 129, 0.9); }
}
.checkmark i {
  font-size: 4rem;
  color: white;
  text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  z-index: 2;
}
.checkmark::before {
  content: '';
  position: absolute;
  width: 80px;
  height: 80px;
  background: var(--success-gradient);
  border-radius: 50%;
  animation: rotate 3s linear infinite;
  z-index: 1;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== SUCCESS TITLE ===== */
.success-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  background: var(--success-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
  line-height: 1.1;
}

/* ===== SUCCESS MESSAGE ===== */
.success-message {
  font-size: 1.25rem;
  color: #166534;
  margin-bottom: 2rem;
  opacity: 0.9;
  font-weight: 500;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* ===== ORDER CONFIRMATION ===== */
.order-details {
  background: rgba(16, 185, 129, 0.15);
  border: 2px solid rgba(16, 185, 129, 0.3);
  border-radius: 20px;
  padding: 1.5rem;
  margin: 2rem 0;
  backdrop-filter: blur(15px);
}
.order-details h3 {
  font-size: 1.25rem;
  font-weight: 700;
  color: #059669;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.order-info {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 1rem;
  font-size: 1rem;
  text-align: left;
}
.order-info span:first-child {
  font-weight: 600;
  color: #374151;
}

/* ===== CTA BUTTONS ===== */
.cta-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 2rem;
}
.btn-primary {
  background: var(--success-gradient);
  color: white;
  padding: 1.25rem 2.5rem;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1.125rem;
  box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.6s;
}
.btn-primary:hover::before { left: 100%; }
.btn-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 25px 50px rgba(16, 185, 129, 0.6);
}
.btn-secondary {
  background: var(--primary-gradient);
  color: white;
  padding: 1.25rem 2rem;
  border-radius: 50px;
  font-weight: 600;
  font-size: 1.125rem;
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 40px rgba(102, 126, 234, 0.6);
}

/* ===== CONFETTI ANIMATION ===== */
@keyframes confetti {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--success-gradient);
  animation: confetti 4s linear infinite;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  body { padding: 1rem; }
  .success-container { padding: 3rem 2rem; margin: 1rem; }
  .cta-buttons { flex-direction: column; }
  .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
  .order-info { grid-template-columns: 1fr; gap: 0.5rem; }
}

@media (max-width: 480px) {
  .checkmark { width: 100px; height: 100px; }
  .checkmark i { font-size: 3rem; }
  .success-title { font-size: 2.5rem; }
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="success-container">
  <div class="checkmark">
    <i class="fas fa-check-circle"></i>
  </div>
  
  <h1 class="success-title">Order Confirmed!</h1>
  <p class="success-message">
    Your delicious masale order has been placed successfully. 
    We'll prepare and dispatch it within 2 hours!
  </p>

  <div class="order-details">
    <h3><i class="fas fa-receipt"></i> Order Details</h3>
    <div class="order-info">
      <span>Order ID:</span>
      <span>#OM{{ "now"|date:"YmdHis" }}</span>
      <span>Status:</span>
      <span><i class="fas fa-clock"></i> Preparing</span>
      <span>Delivery:</span>
      <span>1-2 Days • Free Shipping</span>
    </div>
  </div>

  <div class="cta-buttons">
    <a href="/" class="btn-primary">
      <i class="fas fa-store"></i>
      Continue Shopping
    </a>
    <a href="/orders/" class="btn-secondary">
      <i class="fas fa-list"></i>
      View Orders
    </a>
  </div>
</div>

<!-- Subtle confetti effect -->
<script>
setTimeout(() => {
  for(let i = 0; i < 20; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = `hsl(${Math.random()*60 + 120}, 70%, 60%)`;
      confetti.style.animationDelay = Math.random() * 2 + 's';
      confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 5000);
    }, i * 200);
  }
}, 500);
</script>
</body>
</html>
