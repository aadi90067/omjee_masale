<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>Order Confirmed | Om Masale</title>
<style>
/* ===== OM MASALE CLEAN SUCCESS ===== */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

:root {
  --spice-orange: #ff8a00;
  --accent-red: #ff6b6b;
  --text-dark: #7a3100;
  --text-light: #6b4b2a;
  --glass-bg: rgba(255,255,255,.5);
  --glass-border: rgba(255,255,255,.7);
  --shadow: rgba(120,70,10,.25);
}

body {
  min-height:100vh;
  background: linear-gradient(135deg, #fff7e6, #ffe7cc, #fff1dc);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: clamp(20px, 5vw, 40px);
}

/* Static Background Blobs */
.bg-blur {
  position:absolute;
  width:320px;
  height:320px;
  border-radius:50%;
  filter:blur(80px);
  opacity:.55;
}
.blur1 { top:-80px; left:-80px; background:#ffb347; }
.blur2 { bottom:-90px; right:-50px; background:#ff6b6b; }
.blur3 { top:30%; left:55%; background:#ffd166; width:220px; height:220px; }

/* Success Container */
.success-container {
  background: var(--glass-bg);
  backdrop-filter: blur(30px);
  border-radius: 40px;
  box-shadow: 0 40px 120px var(--shadow);
  border: 2px solid var(--glass-border);
  padding: clamp(40px, 12vw, 80px) clamp(32px, 8vw, 60px);
  text-align: center;
  max-width: clamp(380px, 90vw, 600px);
  width: 100%;
}

/* Success Checkmark */
.checkmark {
  width: clamp(100px, 30vw, 160px);
  height: clamp(100px, 30vw, 160px);
  margin: 0 auto clamp(24px, 8vw, 40px);
  background: linear-gradient(135deg, #ffd166, #ffb347);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(255,209,102,.7);
}

.checkmark i {
  font-size: clamp(36px, 12vw, 64px);
  color: #fff;
  text-shadow: 0 4px 16px rgba(0,0,0,.4);
}

/* Success Title */
.success-title {
  font-size: clamp(28px, 10vw, 48px);
  font-weight: 800;
  background: linear-gradient(135deg, #d35400, var(--spice-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: clamp(12px, 4vw, 24px);
  line-height: 1.1;
}

/* Success Message */
.success-message {
  font-size: clamp(16px, 4vw, 22px);
  color: var(--text-dark);
  margin-bottom: clamp(32px, 10vw, 60px);
  opacity: .95;
  font-weight: 600;
  max-width: 90%;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* Order Details */
.order-details {
  background: linear-gradient(135deg, rgba(255,213,67,.2), rgba(255,107,107,.15));
  border: 3px solid rgba(255,138,0,.4);
  border-radius: 25px;
  padding: clamp(24px, 6vw, 36px);
  margin: clamp(32px, 10vw, 60px) 0;
  backdrop-filter: blur(20px);
}

.order-details h3 {
  font-size: clamp(18px, 5vw, 24px);
  font-weight: 800;
  color: var(--text-dark);
  margin-bottom: clamp(20px, 5vw, 28px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.order-info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: clamp(12px, 3vw, 20px);
  font-size: clamp(14px, 3.5vw, 16px);
  text-align: center;
}

.order-info div span:first-child {
  font-weight: 700;
  color: var(--text-light);
  display: block;
  margin-bottom: 4px;
}

.order-info div span:last-child {
  color: var(--spice-orange);
  font-weight: 700;
}

/* CTA Buttons */
.cta-buttons {
  display: flex;
  gap: clamp(12px, 4vw, 24px);
  flex-wrap: wrap;
  justify-content: center;
  margin-top: clamp(24px, 8vw, 40px);
}

.btn-primary, .btn-secondary {
  padding: clamp(16px, 4vw, 22px) clamp(28px, 8vw, 40px);
  border-radius: 30px;
  font-weight: 800;
  font-size: clamp(15px, 4vw, 18px);
  box-shadow: 0 20px 60px rgba(255,138,0,.5);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
  flex: 1;
  min-width: 160px;
  transition: all .3s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--spice-orange), var(--accent-red));
  color: #fff;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 30px 80px rgba(255,138,0,.7);
}

.btn-secondary {
  background: linear-gradient(135deg, #d35400, var(--spice-orange));
  color: #fff;
  font-weight: 700;
  box-shadow: 0 15px 50px rgba(255,138,0,.4);
}

.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 25px 70px rgba(255,138,0,.6);
}

/* MOBILE PERFECTION */
@media (max-width: 768px) {
  body { padding: clamp(12px, 4vw, 24px); }
  .success-container { 
    padding: clamp(32px, 10vw, 60px) clamp(24px, 8vw, 48px);
    margin: clamp(12px, 4vw, 24px);
  }
  .cta-buttons { 
    flex-direction: column; 
    gap: clamp(16px, 5vw, 24px);
  }
  .btn-primary, .btn-secondary { width: 100%; }
  .order-info { 
    grid-template-columns: 1fr; 
    gap: clamp(16px, 5vw, 24px); 
    text-align: center;
  }
}

@media (max-width: 480px) {
  .checkmark { margin-bottom: clamp(20px, 8vw, 32px); }
  .success-title { line-height: 1; }
}

@media (max-height: 500px) and (orientation: landscape) {
  body { align-items: flex-start; padding-top: 20px; }
  .success-container { margin: 20px; }
}
</style>
</head>
<body>
<!-- Static Background -->
<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>
<div class="bg-blur blur3"></div>

<div class="success-container">
  <div class="checkmark">
    <i class="fas fa-check-circle"></i>
  </div>
  
  <h1 class="success-title">Order Confirmed!</h1>
  <p class="success-message">
    Your delicious masale order has been placed successfully. 
    We'll prepare and dispatch it within 2 hours! Thank you for choosing Om Masale ✨
  </p>

  <div class="order-details">
    <h3><i class="fas fa-receipt"></i> Order #OM{{ "now"|date:"YmdHis" }}</h3>
    <div class="order-info">
      <div>
        <span>Status</span>
        <span><i class="fas fa-clock"></i> Preparing</span>
      </div>
      <div>
        <span>Delivery</span>
        <span>1-2 Days • Free</span>
      </div>
      <div>
        <span>Total</span>
        <span>₹{{total}}</span>
      </div>
    </div>
  </div>

  <div class="cta-buttons">
    <a href="/" class="btn-primary">
      <i class="fas fa-store"></i>
      Continue Shopping
    </a>
    <a href="/orders/" class="btn-secondary">
      <i class="fas fa-list"></i>
      View Orders
    </a>
  </div>
</div>
</body>
</html>
