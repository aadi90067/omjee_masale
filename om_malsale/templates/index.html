{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<title>Om Masale Store</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background:#f6f7fb;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#fff;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo {
  font-size:22px;
  font-weight:700;
}

.cart-btn {
  background:#667eea;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  text-decoration:none;
}

.banner-slider {
  height:250px;
  overflow:hidden;
  position:relative;
}

.banner {
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  opacity:0;
  transition:1s;
}

.banner.active { opacity:1; }

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:15px;
  padding:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:180px;
  object-fit:contain;
}

.name {
  font-weight:600;
  margin-top:10px;
}

.mrp {
  font-size:14px;
  color:#999;
}

.price {
  color:green;
  font-weight:bold;
  font-size:18px;
}

.view-btn {
  display:block;
  margin-top:10px;
  background:#667eea;
  color:#fff;
  text-align:center;
  padding:8px;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Om Masale</div>

  <a href="/cart/" class="cart-btn">
    Cart ({{ request.session.cart|length|default:0 }})
  </a>
</header>

<div class="banner-slider">
  <img src="{% static 'image.png' %}" class="banner active">
  <img src="{% static 'banner3.jpg' %}" class="banner">
</div>

<div class="products">
{% for p in products %}
<div class="card">

  {% if p.image %}
    <img src="{{ p.image.url }}" alt="{{ p.name }}">
  {% else %}
    <img src="{% static 'no-image.png' %}" alt="No Image">
  {% endif %}

  <div class="name">{{ p.name }}</div>
  <div class="mrp">MRP <s>₹{{ p.mrp }}</s></div>
  <div class="price">₹{{ p.pack1_price }}</div>
  <a href="/product/{{ p.id }}/" class="view-btn">View Product</a>

</div>
{% endfor %}
</div>

<script>
let banners = document.querySelectorAll(".banner");
let i = 0;

setInterval(() => {
  banners[i].classList.remove("active");
  i = (i + 1) % banners.length;
  banners[i].classList.add("active");
}, 3000);
</script>

</body>
</html>
